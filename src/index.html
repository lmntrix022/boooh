    <!-- Préchargement des polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Préchargement des ressources critiques -->
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml" />
    
    <!-- Favicon et icônes d'application -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <title>Bööh – Une seule URL. Tout votre business.</title>
    
    <!-- Styles de base et critique -->
    <style>
      /* Style critique pour éviter le FOUC (flash of unstyled content) */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      }
      
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      
      /* Préchargement de l'application */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f9fafb;
        z-index: 9999;
      }
      
      .app-loading-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(147, 51, 234, 0.2);
        border-radius: 50%;
        border-top-color: #9333ea;
        animation: spin 1s ease-in-out infinite;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .app-loading-spinner {
          animation: none;
        }
      }
    </style>
    
    <!-- Script pour détecter la navigation au clavier pour l'accessibilité -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.body.addEventListener('mousedown', function() {
          document.body.classList.add('using-mouse');
        });
        document.body.addEventListener('keydown', function(e) {
          if (e.key === 'Tab') {
            document.body.classList.remove('using-mouse');
          }
        });
      });
      
      // Détecter les appareils à faibles performances
      const isLowPerformanceDevice = () => {
        const navigatorInfo = navigator;
        if (navigatorInfo.deviceMemory && navigatorInfo.deviceMemory < 4) return true;
        if (navigatorInfo.hardwareConcurrency && navigatorInfo.hardwareConcurrency < 4) return true;
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return true;
        return false;
      };
      
      // Appliquer des optimisations pour les appareils à faibles performances
      if (isLowPerformanceDevice()) {
        document.documentElement.classList.add('optimize-animations');
      }
    </script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NDDLMHZL"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root">
      <!-- Préchargement de l'application -->
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    
    <!-- Conteneurs pour les modales et les notifications -->
    <div id="modal-root"></div>
    <div id="toast-root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
