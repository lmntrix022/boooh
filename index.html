    <!-- Preconnect pour les ressources importantes -->

    <!-- CSS critique pour éviter le flash de contenu non stylisé -->
    <style>
      /* Import Google Fonts with font-display: swap (Phase 3.2 optimization) */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      
      /* Styles critiques pour éviter les changements de layout */
      :root {
        --background: #ffffff;
        --primary: #7c3aed;
      }
      body, html {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow-x: hidden;
        max-width: 100vw;
        background-color: var(--background);
        /* Empêcher le resize causé par le clavier mobile */
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      
      /* Fix pour le zoom iOS sur les inputs */
      input, select, textarea {
        font-size: 16px !important; /* Empêche le zoom automatique iOS */
      }
      
      /* Fix pour la visualViewport et le clavier mobile */
      @supports (-webkit-touch-callout: none) {
        body {
          /* iOS specific fixes */
          -webkit-text-size-adjust: 100%;
        }
      }
      
      /* Empêcher le double-tap zoom */
      * {
        touch-action: manipulation;
      }
      .loading-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--background);
      }
      /* Désactivation de toutes les animations si l'utilisateur préfère le mouvement réduit */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    
    <!-- SSR State Injection -->
    <script>
      window.__INITIAL_STATE__ = "<!--app-state-->";
      window.__REACT_QUERY_STATE__ = "<!--react-query-state-->";
      
      // Détecter et sauvegarder les préférences de réduction de mouvement
      window.__PREFERS_REDUCED_MOTION__ = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    </script>
  </head>
